<section class="vault-panel">
  <header class="panel-header">
    <h2>Stored Credentials</h2>
    <div class="header-actions">
      <mat-form-field appearance="outline" class="search-field">
        <mat-label>Search credentials</mat-label>
        <input matInput [value]="search()" (input)="onSearch($any($event.target).value)" />
        <mat-icon matSuffix>search</mat-icon>
      </mat-form-field>
      <button mat-flat-button color="primary" (click)="openAddDialog()">
        <mat-icon>add</mat-icon>
        Add Credential
      </button>
    </div>
  </header>

  @if (loading()) {
    <div class="loading-state">
      <mat-spinner diameter="36"></mat-spinner>
    </div>
  } @else {
    <div class="table-wrapper">
      <table mat-table [dataSource]="filteredCredentials()" class="mat-elevation-z2">
        <ng-container matColumnDef="siteName">
          <th mat-header-cell *matHeaderCellDef>Site Name</th>
          <td mat-cell *matCellDef="let row">{{ row.siteName }}</td>
        </ng-container>

        <ng-container matColumnDef="username">
          <th mat-header-cell *matHeaderCellDef>Username</th>
          <td mat-cell *matCellDef="let row">{{ row.username }}</td>
        </ng-container>

        <ng-container matColumnDef="password">
          <th mat-header-cell *matHeaderCellDef>Password</th>
          <td mat-cell *matCellDef="let row">
            <span class="password">{{ getPasswordLabel(row.id) }}</span>
            <button mat-icon-button (click)="copyPassword(row.id)" matTooltip="Copy revealed password">
              <mat-icon>content_copy</mat-icon>
            </button>
          </td>
        </ng-container>

        <ng-container matColumnDef="actions">
          <th mat-header-cell *matHeaderCellDef>Actions</th>
          <td mat-cell *matCellDef="let row">
            <button mat-stroked-button color="primary" (click)="requestViewPassword(row)">View</button>
            <button mat-stroked-button (click)="requestEdit(row)">Edit</button>
            <button mat-stroked-button color="warn" (click)="requestDelete(row)">Delete</button>
          </td>
        </ng-container>

        <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
        <tr mat-row *matRowDef="let row; columns: displayedColumns"></tr>
      </table>
    </div>
  }
</section>
